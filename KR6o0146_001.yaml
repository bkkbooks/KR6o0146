body:
  text: 西天譯經三藏朝散大夫試光祿卿明教大師臣法賢奉詔譯爾時喏嚩迦仙人忽作是念世間衆生皆從女人而生其身而彼女人從初懷孕至滿十月或復延胎至十二月方始産生或於中間有其病患於病患時極受苦痛我今方便請問於師稟受方藥與作救療作是念已即詣於師迦葉仙人伸師資禮而作問言大師迦葉是大智者我今欲有所問願垂聽許迦葉仙言恣汝所問時喏嚩迦仙人白言女人懷孕期當十月或十二月日滿方生云何中間有諸病患遂致胎藏轉動不安或有損者苦惱無量我師大智願為宣説救療如是病苦方藥作是問已聽受而住爾時迦葉仙人告喏嚩迦仙言女人懷孕不知保護遂使胎藏得不安隱我今為汝略説隨月保護之藥懷孕之人第一月內胎藏不安者當用栴檀香蓮花憂鉢羅花入水同研後入乳汁乳糖同煎溫服此藥能令初懷孕者無諸損惱而得安樂復次告喏嚩迦仙言女人懷孕於第二月胎藏不安者當用青色憂鉢羅花俱母那花根菱角仁羯細嚕迦等藥諸藥等分搗篩為粖用乳汁煎候冷服之此藥能令胎藏不損疼痛止息晝夜安隱復次女人懷孕至第三月胎藏不安者當用迦俱𭋹藥叱囉迦俱𭋹藥及萆麻根等諸藥等分以水相和研令極細又入乳汁同煎令熟後入乳糖及蜜相和冷服此藥能安胎藏止息疼痛若有患者服之安樂復次女人懷孕至第四月胎藏不安者當用蒺藜草根并枝葉等憂鉢羅花并及莖𦾮等分用之以水相和研令極細復用乳汁同煎令熟候冷服之此藥能安胎藏止息疼痛患者服之而得安樂復次女人懷孕至第五月胎藏不安者當用瓠子根及憂鉢羅花各用等分搗篩令細後入蒲萄汁乳汁乳糖同煎候冷服之此藥能安胎藏止息疼痛患者服之而得安樂復次女人懷孕至第六月胎藏不安者當用閉阿羅藥子摩地迦羅惹藥薩訖多嚩藥各用等分以水相和研令極細復入乳汁同煎後入乳糖及蜜候冷服之此藥能安胎藏止息疼痛患者服之而得安樂復次女人懷孕至第七月胎藏不安者當用蒺䔧草枝葉并根搗篩為粖用乳糖及蜜為丸用肉汁服之復以肉汁飱飯食之或食菉豆粥飯此藥及飯能安胎藏患者服食而得安樂復次女人懷孕至第八月胎藏不安者當用三𤚥誐藥蓮花青憂鉢羅花蒺䔧草各等分以冷水相和研令極細後入乳汁及糖蜜等同煎候冷服之此藥能安胎藏止息疼痛患者服之而得安樂復次女人懷孕至第九月胎藏不安者當用萆麻根迦俱𭋹藥舍羅鉢赧尼藥沒哩賀底藥各等分以冷水相和研令極細入乳汁同煎候冷服之此藥能安胎藏止息疼痛患者服之而得安樂復次女人懷孕至第十月胎藏不安者當用菉豆憂鉢羅花等分以水相和研令極細復入乳糖及蜜并乳汁同煎候冷服之此藥能安胎藏止息疼痛患者服之而得安樂復次女人懷孕延胎十一月胎藏不安者當用青憂鉢羅花娑路剛藥蓮花并莖等分以冷水相和研令極細後入乳汁乳糖同煎候冷服之此藥能安胎藏止息疼痛患者服之而得安樂復次女人懷孕延至第十二月胎藏不安者當用迦俱𭋹藥叱囉迦俱𭋹藥甘草憂鉢羅花各等分搗篩令細以水同研後入乳汁相和煎熟候冷服之此藥能安胎藏止息疼痛患者服之而得安樂爾時喏嚩迦仙人聞師説是女人懷孕保養法已歡喜信受作禮而退
